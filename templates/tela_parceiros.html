<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BemAqui | Empresa</title>

  <link rel="stylesheet" href="../static/css/base.css" />
  <link rel="stylesheet" href="../static/css/tela_parceiros.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel auth-brand">
      <div class="brand-box">
        <span class="brand-badge">Área da Empresa</span>
        <h1>BemAqui</h1>
        <p>
          Acesse sua conta empresarial ou cadastre sua empresa para participar da plataforma.
        </p>
      </div>
    </section>

    <section class="auth-panel auth-form-panel">
      <div class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Login e cadastro da empresa">
          <button class="auth-tab active" id="tab-login" type="button" role="tab" aria-selected="true">
            Login
          </button>
          <button class="auth-tab" id="tab-register" type="button" role="tab" aria-selected="false">
            Cadastro
          </button>
        </div>

        <div id="form-message" class="form-message hidden" aria-live="polite"></div>

        <form id="company-login-form" class="auth-form active" novalidate>
          <h2>Entrar como empresa</h2>

          <div class="form-group">
            <label for="login-email">E-mail</label>
            <input
              class="input-default"
              type="email"
              id="login-email"
              name="email"
              autocomplete="username"
              placeholder="empresa@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="login-password">Senha</label>
            <input
              class="input-default"
              type="password"
              id="login-password"
              name="password"
              autocomplete="current-password"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <form id="company-register-form" class="auth-form hidden" novalidate>
          <h2>Cadastrar empresa</h2>

          <div class="form-group">
            <label for="company-name">Nome da empresa</label>
            <input
              class="input-default"
              type="text"
              id="company-name"
              name="name"
              autocomplete="organization"
              placeholder="Digite o nome da empresa"
              required
            />
          </div>

          <div class="form-group">
            <label for="company-cnpj">CNPJ</label>
            <input
              class="input-default"
              type="text"
              id="company-cnpj"
              name="cnpj"
              inputmode="numeric"
              placeholder="00.000.000/0000-00"
              required
            />
          </div>

          <div class="form-group">
            <label for="company-email">E-mail</label>
            <input
              class="input-default"
              type="email"
              id="company-email"
              name="email"
              autocomplete="email"
              placeholder="empresa@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="company-password">Senha</label>
            <input
              class="input-default"
              type="password"
              id="company-password"
              name="password"
              autocomplete="new-password"
              placeholder="Crie uma senha"
              required
            />
          </div>

          <div class="form-group">
            <label for="company-confirm-password">Confirmar senha</label>
            <input
              class="input-default"
              type="password"
              id="company-confirm-password"
              name="confirmPassword"
              autocomplete="new-password"
              placeholder="Repita a senha"
              required
            />
          </div>

          <button type="submit" class="btn-primary">Cadastrar empresa</button>
        </form>
      </div>
    </section>
  </main>

  <script src="../static/js/tela_parceiros.js"></script>
</body>
</html>
