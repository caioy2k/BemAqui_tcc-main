<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BemAqui | Redefinir senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #14532d);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    }
    h1 {
      font-size: 28px;
      color: #14532d;
      margin-bottom: 10px;
    }
    p {
      color: #475569;
      margin-bottom: 24px;
      line-height: 1.55;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1e293b;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }
    button {
      width: 100%;
      border: none;
      background: #16a34a;
      color: white;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #15803d;
    }
    .message {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }
    .message.error { color: #b91c1c; }
    .message.success { color: #15803d; }
    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #166534;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redefinir senha</h1>
    <p>Digite o código recebido por e-mail e escolha sua nova senha.</p>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="code">Código</label>
        <input type="text" id="code" name="code" maxlength="6" placeholder="Digite o código de 6 dígitos" required />
      </div>

      <div class="form-group">
        <label for="newPassword">Nova senha</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Digite a nova senha" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar nova senha</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita a nova senha" required />
      </div>

      <button type="submit">Redefinir senha</button>
      <div id="message" class="message"></div>
    </form>

    <a class="back-link" href="tela_login.html">Voltar para o login</a>
  </div>

  <script>
    const API_URL = "https://bemaqui-tcc-main.onrender.com";
    const form = document.getElementById("resetPasswordForm");
    const message = document.getElementById("message");

    const params = new URLSearchParams(window.location.search);
    const emailFromUrl = params.get("email");
    if (emailFromUrl) {
      document.getElementById("email").value = emailFromUrl;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "";
      message.className = "message";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const code = document.getElementById("code").value.trim();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      try {
        const response = await fetch(`${API_URL}/api/auth/reset-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            code,
            newPassword,
            confirmPassword
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Não foi possível redefinir a senha.");
        }

        message.textContent = data.message || "Senha redefinida com sucesso.";
        message.classList.add("success");
        form.reset();

        setTimeout(() => {
          window.location.href = "tela_login.html";
        }, 1500);
      } catch (error) {
        message.textContent = error.message;
        message.classList.add("error");
      }
    });
  </script>
</body>
</html>
