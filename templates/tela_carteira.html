<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira Digital - BemAqui</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/tela_carteira.css">
</head>
<body>
  <!-- Header -->
  <header class="header bg-primary text-white py-3">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="mb-0">💰 Minha Carteira</h1>
          <p class="mb-0">BemAqui - Recicle e Ganhe</p>
        </div>
        <a href="tela_beneficiario_menu.html" class="btn btn-light">← Voltar</a>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <!-- Saldo Principal -->
    <div class="row mb-5">
      <div class="col-12">
        <div class="card balance-card shadow-lg">
          <div class="card-body text-center">
            <h2 id="balance" class="display-4 fw-bold text-success mb-1">R$ 0,00</h2>
            <p class="lead text-muted">Saldo disponível</p>
            <div class="mt-3">
              <button id="refreshBtn" class="btn btn-outline-primary me-2">🔄 Atualizar</button>
              <button onclick="novaTroca()" class="btn btn-success">🛒 Nova Troca</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- Estatísticas -->
      <div class="col-md-3 mb-4">
        <div class="card stat-card bg-warning text-dark">
          <div class="card-body text-center">
            <h3 id="totalEarned" class="mb-1">0</h3>
            <p class="mb-0 small">Total Ganho</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-4">
        <div class="card stat-card bg-info text-white">
          <div class="card-body text-center">
            <h3 id="totalSpent" class="mb-1">0</h3>
            <p class="mb-0 small">Total Gasto</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-4">
        <div class="card stat-card bg-success text-white">
          <div class="card-body text-center">
            <h3 id="totalRecycledPoints" class="mb-1">0</h3>
            <p class="mb-0 small">Pontos Reciclados</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-4">
        <div class="card stat-card bg-secondary text-white">
          <div class="card-body text-center">
            <h3 id="netBalance" class="mb-1">0</h3>
            <p class="mb-0 small">Saldo Líquido</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Histórico Recente -->
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5>📜 Últimas Transações</h5>
            <a href="#" class="small text-primary">Ver todas →</a>
          </div>
          <div class="card-body">
            <div id="transactionsList" class="list-group list-group-flush">
              <div class="list-group-item text-center py-4 text-muted">
                Carregando transações...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../static/js/tela_carteira.js"></script>
</body>
</html>
